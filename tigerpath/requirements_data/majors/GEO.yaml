- name: Independent Work
  max_counted: 1
  min_needed: 1
  explanation: |-
    <i>Editor's Note: Majors do not enroll in any numbered course for this requirement, so hoagieplan does not check it.</i><br><br>

    All juniors are required to conduct independent research in both the fall and spring terms. Each term, this work includes a written progress report, final written report, and a poster presentation of your final JP work.  Faculty members will evaluate student poster presentations and submit feedback and grades. Although geoengineers are not required to conduct JP research, some geoengineers have conducted independent research in geosciences or engineering for course credit.<br><br>

    Different research topics are available in any given year and some ideas are listed in the Shopping Guide, which students obtain from the undergraduate coordinator. Students are encouraged to consult with their faculty advisers for suggestions regarding selection of the JP project. If students have other exciting ideas for possible JP projects, they are encouraged to consult their faculty advisers to discuss the feasibility of these projects. The fall JP consists of a research proposal. The proposal includes a statement of the hypothesis you are proposing to test, a literature review that motivates your work, and preliminary data collection (i.e., field work, laboratory analysis, and/or data mining) and analysis that convinces the reader you will be able to test your central hypothesis. The fall JP is presented as a poster presentation to the Geosciences Department prior to submitting a final written report.<br><br>

    The spring JP project is a full scientific research paper. A student may choose to work on the same topic they proposed in the fall, or on a completely new topic with a new adviser. All spring JP work must include original data analysis; a literature review by itself does not qualify as a JP project. Many opportunities for collecting data are available, either through the student's own efforts (including field work, experiments conducted in any of the several laboratories in the department, and computer simulations) or by accessing databases made available by and for the scientific community at large. The spring JP is presented as a poster to the Geosciences Department prior to submitting a final written report.<br><br>

    Proposals for funding to support independent work are due in late September/early October for the fall JP, and mid-February for the spring JP (but please see the ST/JP Guide for details each year as the due dates are subject to change). Part of the JP grade is awarded based on two reports submitted at two different milestones during the semester. The final grade for both fall and spring independent research is decided based on the quality of the research and the written and oral work of the student.<br><br>
- name: Senior Thesis
  max_counted: 1
  min_needed: 1
  explanation: |-
    <i>Editor's Note: Majors do not enroll in any numbered course for this requirement, so hoagieplan does not check it.</i><br><br>

    The senior research thesis project involves a much more in-depth study in the chosen topic and is a full-year effort. Students should budget their time accordingly. Each geosciences senior will choose an appropriate faculty member as senior thesis adviser in consultation with the departmental adviser and the faculty members that support the student's interests. The student is expected to conduct research in the adviser's laboratory and work closely with the adviser and/or graduate students/postdoctoral fellows.<br><br>

    The department publishes a Shopping Guide, which lists some research topics that the geosciences faculty members currently are pursuing. The Shopping Guide is a good starting point to identify a list of topics and research advisers from which students can select a topic and adviser for their senior independent research in consultation with the departmental adviser and faculty members. Students interested in pursuing a topic that is not part of the Shopping Guide are encouraged to approach their departmental advisor to discuss the feasibility of conducting the research either under the supervision of a faculty member in the department or in another department in the University. Many students select their projects early, in consultation with the faculty adviser, and begin the research during the summer preceding the senior year. The department and the faculty adviser usually provide the necessary funds to conduct the independent research. The department requires that a student submit a thesis proposal (due in late September or early October) and several interim research progress reports, including the fall semester progress report, a rough draft of the thesis for feedback, and the final thesis. The goal of the interim reports is to facilitate timely adviser-student feedback, help minimize the unavoidable thesis rush at the end of the year, and ensure that the final product of the thesis is of the highest quality. In addition to writing their theses, all students give oral presentations to the faculty and students of the geosciences department. The grade for the thesis is based on the quality of the research, the written report, and the oral presentation.
